<!DOCTYPE html>
<html lang="zh-CN" data-theme="juanben">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>司南 · AI 起始页</title>
<meta name="description" content="司南 AI 起始页：万维网搜索、AI 工具导航与悬象项目快捷入口。">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#ede4d0;--card:rgba(255,250,240,.76);--card2:rgba(255,250,240,.94);--pri:#6b3410;--pri-l:rgba(107,52,16,.1);--acc:#6b8f50;--acc-l:rgba(107,143,80,.12);--txt:#2b1e10;--txt2:#6a5a40;--txt3:#9a8a70;--bdr:rgba(43,30,16,.1);--shd:rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:"Noto Serif SC",serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}button,input{font-family:inherit}button{cursor:pointer}
.mtn{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}.mtn svg{width:100%;height:100%}
main{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:26px 20px 36px}
.top{height:48px;display:flex;align-items:center;justify-content:space-between;margin-bottom:36px}.brand{font-size:24px;font-weight:900;color:var(--pri);letter-spacing:8px}.top-links{display:flex;gap:18px;color:var(--txt2);font-size:13px;font-weight:800}.top-links a:hover{color:var(--pri)}
.hero{min-height:330px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px 0 28px}.mark{font-size:18px;color:var(--acc);letter-spacing:8px;font-weight:900;margin-bottom:16px}.hero h1{font-size:54px;letter-spacing:12px;margin-bottom:14px;color:var(--pri)}.hero p{color:var(--txt2);font-size:15px;line-height:1.8}
.search-box{width:min(780px,100%);margin:28px auto 0}.engine-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}.engine{border:1px solid transparent;background:transparent;color:var(--txt3);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:900}.engine.on{background:var(--pri-l);border-color:var(--bdr);color:var(--pri)}
.search-form{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--bdr);border-radius:999px;padding:8px 8px 8px 22px;box-shadow:0 18px 50px var(--shd)}.search-form:focus-within{border-color:var(--pri);box-shadow:0 18px 54px var(--shd),0 0 0 4px var(--pri-l)}.search-form input{flex:1;height:46px;border:0;outline:0;background:transparent;color:var(--txt);font-size:18px}.search-form input::placeholder{color:var(--txt3)}.search-form button{height:46px;border:0;border-radius:999px;background:var(--pri);color:#fff;padding:0 26px;font-size:15px;font-weight:900;letter-spacing:2px}
.hint{margin-top:10px;color:var(--txt3);font-size:12px}.hint span{font-family:Inter,sans-serif}
.quick{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-top:22px;width:min(900px,100%)}.quick a{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:13px 8px;display:grid;place-items:center;gap:7px;min-height:76px;transition:all .25s}.quick a:hover{transform:translateY(-3px);background:var(--card2);border-color:var(--pri);box-shadow:0 12px 30px var(--shd)}.q-ico{width:30px;height:30px;border-radius:10px;background:var(--pri-l);display:grid;place-items:center;font-weight:900}.quick b{font-size:13px}
.layout{display:grid;grid-template-columns:250px minmax(0,1fr);gap:18px;margin-top:28px}.side,.content{background:var(--card);border:1px solid var(--bdr);border-radius:18px;backdrop-filter:blur(8px)}.side{padding:14px;height:max-content;position:sticky;top:16px}.side h2,.content h2{font-size:18px;letter-spacing:3px;margin-bottom:12px}.cat{width:100%;display:flex;align-items:center;justify-content:space-between;border:1px solid transparent;border-radius:11px;background:transparent;color:var(--txt2);padding:10px 12px;font-size:13px;font-weight:900;text-align:left}.cat:hover,.cat.on{background:var(--pri-l);border-color:var(--bdr);color:var(--pri)}.cat span:last-child{font-family:Inter,sans-serif;color:var(--txt3);font-size:12px}
.content{padding:16px}.bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.bar p{color:var(--txt2);font-size:13px}.mini-search{width:260px;height:36px;border:1px solid var(--bdr);border-radius:999px;background:rgba(255,255,255,.34);padding:0 12px;outline:0;color:var(--txt)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}.card{display:flex;flex-direction:column;min-height:148px;background:rgba(255,255,255,.28);border:1px solid var(--bdr);border-radius:14px;padding:14px;transition:all .25s}.card:hover{background:var(--card2);border-color:var(--pri);transform:translateY(-3px);box-shadow:0 12px 30px var(--shd)}.card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}.ico{width:34px;height:34px;border-radius:10px;background:var(--pri-l);display:grid;place-items:center;font-weight:900;flex:none}.card h3{font-size:15px}.card p{color:var(--txt2);font-size:12px;line-height:1.6;flex:1}.meta{display:flex;align-items:center;justify-content:space-between;margin-top:12px}.label{font-size:11px;color:var(--txt3);background:var(--acc-l);padding:4px 8px;border-radius:20px;font-weight:900}.open{font-size:12px;color:var(--acc);font-weight:900}
.projects{margin-top:18px}.project-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.empty{display:none;text-align:center;color:var(--txt3);border:1px dashed var(--bdr);border-radius:14px;padding:32px}
footer{text-align:center;color:var(--txt3);font-size:12px;letter-spacing:2px;margin-top:40px;padding-top:24px;border-top:1px solid var(--bdr)}
@media(max-width:860px){main{padding:18px 14px 28px}.top{margin-bottom:20px}.brand{font-size:21px}.top-links{gap:12px}.hero h1{font-size:40px;letter-spacing:8px}.search-form{border-radius:18px;display:grid;padding:12px}.search-form button{width:100%}.quick{grid-template-columns:repeat(4,1fr)}.layout{grid-template-columns:1fr}.side{position:static}.bar{display:grid}.mini-search{width:100%}}
@media(max-width:520px){.quick{grid-template-columns:repeat(2,1fr)}.engine-row{justify-content:flex-start}.hero{align-items:stretch;text-align:left}.mark{text-align:center}.hero h1{text-align:center}}
</style>
</head>
<body>
<div class="mtn"><svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice"><path d="M0,900 L0,620 Q110,520 230,610 Q380,470 520,590 Q690,450 850,570 Q1010,430 1180,540 Q1320,490 1440,530 L1440,900Z" fill="rgba(107,52,16,.06)"/><path d="M0,900 L0,720 Q180,650 360,710 Q600,620 840,700 Q1080,610 1440,690 L1440,900Z" fill="rgba(107,143,80,.08)"/></svg></div>
<main>
  <header class="top">
    <a class="brand" href="/index.html">司 南</a>
    <nav class="top-links"><a href="/index.html">悬象</a><a href="#tools">工具</a><a href="#projects">项目</a></nav>
  </header>

  <section class="hero">
    <div class="mark">XUANXIANG START</div>
    <h1>司南</h1>
    <p>万维网搜索、AI 工具导航与悬象项目入口。</p>
    <div class="search-box">
      <div class="engine-row" id="engineRow"></div>
      <form class="search-form" id="searchForm">
        <input id="webSearch" type="search" autocomplete="off" autofocus placeholder="搜索整个互联网...">
        <button type="submit">搜索</button>
      </form>
      <div class="hint">回车跳转到所选搜索引擎；下方会同步筛选本地 AI 工具。</div>
    </div>
    <div class="quick" id="quickTools"></div>
  </section>

  <section class="layout" id="tools">
    <aside class="side">
      <h2>工具分类</h2>
      <div id="catList"></div>
    </aside>
    <div class="content">
      <div class="bar">
        <div><h2>AI 工具索引</h2><p id="summary">全部工具</p></div>
        <input class="mini-search" id="localSearch" type="search" placeholder="筛选工具...">
      </div>
      <div class="grid" id="toolGrid"></div>
      <div class="empty" id="empty">没有匹配的工具。</div>
    </div>
  </section>

  <section class="content projects" id="projects">
    <div class="bar"><div><h2>悬象项目</h2><p>常用项目快捷入口。</p></div></div>
    <div class="project-grid" id="projectGrid"></div>
  </section>

  <footer>© 2026 悬象 · Xuán Xiàng</footer>
</main>
<script src="/ai-tools-data.js"></script>
<script>
const engines=[
  {id:'google',name:'Google',url:'https://www.google.com/search?q='},
  {id:'baidu',name:'百度',url:'https://www.baidu.com/s?wd='},
  {id:'bing',name:'Bing',url:'https://www.bing.com/search?q='},
  {id:'perplexity',name:'Perplexity',url:'https://www.perplexity.ai/search?q='},
  {id:'github',name:'GitHub',url:'https://github.com/search?q='},
  {id:'bilibili',name:'Bilibili',url:'https://search.bilibili.com/all?keyword='},
  {id:'youtube',name:'YouTube',url:'https://www.youtube.com/results?search_query='},
  {id:'zhihu',name:'知乎',url:'https://www.zhihu.com/search?type=content&q='}
];
const projects=[
  {name:'云中书 YunType',cat:'项目',url:'/yuntype/',icon:'云',desc:'AI 排版工具，支持公众号富文本、小红书图片组和多种内容样式组合。',tags:'排版 公众号 图文'},
  {name:'故事熔炉 StoryForge',cat:'项目',url:'/storyforge/',icon:'故',desc:'AI 小说创作工坊，覆盖世界观、大纲、章节、角色和素材导入。',tags:'小说 写作 创作'},
  {name:'InfiniteSkill',cat:'项目',url:'/infiniteskill/',icon:'技',desc:'将专业书籍和文档编译为大模型可调用的结构化 Skill 技能包。',tags:'文档 skill 知识'},
  {name:'AI 视觉探索书',cat:'项目',url:'https://github.com/yuanbw2025/ai-visual-exploration-book',icon:'视',desc:'图片即 UI，点击区域生成下一层知识页面，并导出可交互单 HTML。',tags:'学习 页面 视觉'},
  {name:'项目推广视频生成器',cat:'项目',url:'https://github.com/yuanbw2025/promo-video-maker',icon:'影',desc:'用截图和文稿生成配音、字幕和 MP4，面向项目推广视频。',tags:'视频 推广 配音'},
  {name:'飞剑弹珠',cat:'项目',url:'/game.html',icon:'剑',desc:'纯 Canvas HTML5 弹珠小游戏，打开即玩。',tags:'游戏 canvas'},
  {name:'赛博飞剑',cat:'项目',url:'/cyber-flying-sword/',icon:'锋',desc:'摄像头手势操控飞剑鞭子的 3D 动作游戏。',tags:'游戏 3D 手势'},
  {name:'AI 演示稿生成器',cat:'项目',url:'/ai-presentation/',icon:'演',desc:'一句话描述主题，快速生成可放映的交互式演示稿。',tags:'演示 页面 AI'}
];
const tools=window.AI_TOOLS||[];
const state={engine:localStorage.getItem('sinan-engine')||'google',cat:'全部',q:''};
const engineRow=document.getElementById('engineRow');
const webSearch=document.getElementById('webSearch');
const localSearch=document.getElementById('localSearch');
const catList=document.getElementById('catList');
const toolGrid=document.getElementById('toolGrid');
const empty=document.getElementById('empty');
const summary=document.getElementById('summary');
function textOf(t){return [t.name,t.cat,t.desc,t.tags].join(' ').toLowerCase()}
function cats(){return ['全部',...Array.from(new Set(tools.map(t=>t.cat)))]}
function renderEngines(){
  engineRow.innerHTML=engines.map(e=>`<button type="button" class="engine ${state.engine===e.id?'on':''}" data-id="${e.id}">${e.name}</button>`).join('');
  engineRow.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{state.engine=btn.dataset.id;localStorage.setItem('sinan-engine',state.engine);renderEngines();webSearch.focus();}));
}
function renderCats(){
  catList.innerHTML=cats().map(cat=>{const count=cat==='全部'?tools.length:tools.filter(t=>t.cat===cat).length;return `<button class="cat ${state.cat===cat?'on':''}" data-cat="${cat}"><span>${cat}</span><span>${count}</span></button>`}).join('');
  catList.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{state.cat=btn.dataset.cat;renderCats();renderTools();}));
}
function filtered(){
  const q=state.q.trim().toLowerCase();
  return tools.filter(t=>(state.cat==='全部'||t.cat===state.cat)&&(!q||textOf(t).includes(q)));
}
function card(t){return `<a class="card" href="${t.url}" target="${t.url.startsWith('/')?'_self':'_blank'}" rel="noreferrer"><div class="card-top"><div class="ico">${t.icon}</div><h3>${t.name}</h3></div><p>${t.desc}</p><div class="meta"><span class="label">${t.cat}</span><span class="open">打开 →</span></div></a>`}
function renderTools(){
  const list=filtered();
  toolGrid.innerHTML=list.map(card).join('');
  empty.style.display=list.length?'none':'block';
  summary.textContent=`${state.cat} · ${list.length} 个匹配`;
}
function renderQuick(){
  const names=['ChatGPT','Claude','DeepSeek','豆包','Kimi','通义千问','智谱清言','MiniMax / 海螺 AI'];
  const quick=names.map(n=>tools.find(t=>t.name===n)).filter(Boolean);
  document.getElementById('quickTools').innerHTML=quick.map(t=>`<a href="${t.url}" target="_blank" rel="noreferrer"><span class="q-ico">${t.icon}</span><b>${t.name}</b></a>`).join('');
}
function renderProjects(){document.getElementById('projectGrid').innerHTML=projects.map(card).join('')}
function syncQuery(v){state.q=v;localSearch.value=v;renderTools()}
webSearch.addEventListener('input',e=>syncQuery(e.target.value));
localSearch.addEventListener('input',e=>{state.q=e.target.value;webSearch.value=e.target.value;renderTools();});
document.getElementById('searchForm').addEventListener('submit',e=>{
  e.preventDefault();
  const q=webSearch.value.trim();
  if(!q){webSearch.focus();return}
  const engine=engines.find(e=>e.id===state.engine)||engines[0];
  window.location.href=engine.url+encodeURIComponent(q);
});
renderEngines();renderCats();renderQuick();renderProjects();renderTools();
</script>
</body>
</html>
