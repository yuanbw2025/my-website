name: Sync to Gitee + Deploy to CloudBase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror-gitee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitee
        run: |
          git remote add gitee https://Aloneoneyuan:${{ secrets.GITEE_TOKEN }}@gitee.com/Aloneoneyuan/my-website.git
          git push gitee main --force

  deploy-cloudbase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to CloudBase static hosting
        uses: TencentCloudBase/cloudbase-action@v2
        with:
          secretId: ${{ secrets.TENCENT_SECRET_ID }}
          secretKey: ${{ secrets.TENCENT_SECRET_KEY }}
          envId: mywebsite-d8gvyutlm167e92e1
          staticSrcPath: ./
          staticDestPath: /
