name: Sync to Gitee + Deploy to CloudBase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror-gitee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitee
        run: |
          git remote add gitee https://Aloneoneyuan:${{ secrets.GITEE_TOKEN }}@gitee.com/Aloneoneyuan/my-website.git
          git push gitee main --force

  deploy-cloudbase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy to CloudBase static hosting
        run: |
          tcb login --apiKeyId ${{ secrets.TENCENT_SECRET_ID }} --apiKey ${{ secrets.TENCENT_SECRET_KEY }}
          rsync -a --exclude='.git' --exclude='node_modules' --exclude='.github' ./ /tmp/deploy/
          tcb hosting deploy /tmp/deploy/ / --env-id mywebsite-d8gvyutlm167e92e1
